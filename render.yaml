services:
  - type: web
    name: fraudguard-ai-v2
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: uvicorn server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard!
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_ENV
        value: production
